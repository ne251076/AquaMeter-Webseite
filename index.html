<title>Mein AquaMeter – Anmelden</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<meta name="description" content="Melde dich mit deinem AquaMeter-App-Konto an, um deine Wasserwerte auch im Browser einzusehen und zu bearbeiten.">

    });

</script>
<style>
  :root{
    --bg: #0a121e;
    --surface: #101b2c;
    --surface-2: #152238;
    --border: #233149;
    --text: #eaf3f7;
    --text-muted: #9fb3c8;
    --good: #4cae7d;
    --warn: #f2b134;
    --danger: #e85d4a;
    --accent: #3db8e8;
    --surface-translucent: rgba(16,27,44,0.92);
  }
  html.theme-light{
    --bg: #F3F8F8;
    --surface: #FFFFFF;
    --surface-2: #EAF1F1;
    --border: #DAE5E5;
    --text: #142023;
    --text-muted: #5B6C6E;
    --good: #2F8A37;
    --warn: #B56A10;
    --danger: #B7362A;
    --accent: #1C7F8C;
    --surface-translucent: rgba(255,255,255,0.92);
  }
  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  /* Scrollbalken komplett unsichtbar, Scrollen bleibt weiterhin möglich */
  ::-webkit-scrollbar{ display:none; width:0; height:0; }
  html{ scrollbar-width:none; -ms-overflow-style:none; }
  *{ scrollbar-width:none; -ms-overflow-style:none; }
  html,body{
    height:100%;
    overflow:hidden;           /* Verhindert, dass das gesamte Dokument scrollt/bounced */
    overscroll-behavior:none;  /* Unterbindet den iOS-Gummiband-Effekt auf Dokumentebene */
  }
  body{
    margin:0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display:flex;
    justify-content:center;
    position:fixed;   /* Zusätzliche Absicherung gegen Verschieben bei kurzen Seiten */
    inset:0;
  }
  #app{
    width:100%;
    max-width:480px;
    height:100%;        /* Fixe Höhe statt min-height: Header/Nav können so nicht "mitwandern" */
    height:100dvh;       /* Bevorzugt: berücksichtigt die dynamische Safari-Werkzeugleiste korrekt */
    display:flex;
    flex-direction:column;
    position:relative;
    overflow:hidden;
    background:
      radial-gradient(120% 60% at 50% 0%, rgba(61,184,232,0.10), transparent 60%),
      var(--bg);
  }
  @media (min-width: 700px){
    #app{ max-width: 720px; }
  }
  @media (min-width: 1100px){
    #app{ max-width: 960px; }
  }
  .mono{ font-family: 'IBM Plex Mono', 'SFMono-Regular', Consolas, monospace; }

  /* Top bar */
  header{
    padding: calc(18px + env(safe-area-inset-top)) 18px 14px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-bottom: 1px solid var(--border);
  }
  .brand{ display:flex; flex-direction:column; gap:2px; }
  .brand-title{
    font-family: 'Space Grotesk','Inter',sans-serif;
    font-size: 20px;
    font-weight:700;
    letter-spacing: 0.2px;
  }
  .brand-title span{ color: var(--accent); }
  .tank-select{
    background:none; border:none; color:var(--text); font-weight:600; font-size:13px;
    padding:0; cursor:pointer; -webkit-appearance:none; appearance:none;
    max-width:200px;
  }
  .tank-select:focus{ outline:none; }
  .tank-select-wrap{ position:relative; display:inline-flex; align-items:center; }
  .tank-select-wrap .tank-select{ padding-right:14px; }
  .tank-select-arrow{
    position:absolute; right:-2px; top:50%; transform:translateY(-50%);
    pointer-events:none; color:var(--text-muted); font-size:10px;
  }
  .icon-btn{
    background: var(--surface);
    border: 1px solid var(--border);
    width:38px; height:38px; border-radius:10px;
    display:flex; align-items:center; justify-content:center;
    color: var(--text-muted); cursor:pointer;
  }
  .icon-btn:active{ background: var(--surface-2); }

  main{ flex:1; padding: 16px 16px 100px; overflow-y:auto; overscroll-behavior:contain; -webkit-overflow-scrolling:touch; }
  main.wissen-mode{ padding:0; overflow:hidden; }

  /* Tank chips */
  .tank-chips{ display:flex; gap:8px; overflow-x:auto; padding-bottom:14px; }
  .chip{
    flex-shrink:0;
    padding:7px 14px;
    border-radius:999px;
    border:1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    font-size:13px;
    cursor:pointer;
    white-space:nowrap;
  }
  .chip.active{ background: var(--accent); color:#06131d; border-color:var(--accent); font-weight:600; }

  .section-label{
    font-size:11px; text-transform:uppercase; letter-spacing:1.2px;
    color:var(--text-muted); margin: 4px 2px 10px;
  }

  /* Param grid */
  .grid{ display:grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap:12px; }
  .card{
    background: var(--surface);
    border:1px solid var(--border);
    border-radius:16px;
    padding:14px;
    display:flex; flex-direction:column; gap:8px;
  }
  .card-top{ display:flex; justify-content:space-between; align-items:flex-start; }
  .param-label{ font-size:12px; color:var(--text-muted); }
  .status-dot{ width:8px; height:8px; border-radius:50%; margin-top:4px; }
  .status-dot.good{ background: var(--good); }
  .status-dot.warn{ background: var(--warn); }
  .status-dot.danger{ background: var(--danger); }
  .status-dot.none{ background: #3a4a4d; }
  .param-value{ font-family:'Space Grotesk',sans-serif; font-size:24px; font-weight:700; }
  .param-value small{ font-size:13px; font-weight:500; color:var(--text-muted); margin-left:3px; }
  .swatch{
    height:8px; border-radius:5px; position:relative; margin-top:2px;
  }
  .swatch .pointer{
    position:absolute; top:-3px; width:2px; height:14px; background:#fff;
    border-radius:2px; box-shadow:0 0 0 1px rgba(0,0,0,0.4);
  }
  .spark{ align-self:flex-end; opacity:0.9; }
  .empty-hint{ font-size:11px; color:var(--text-muted); }

  /* Stats bar */
  .stats-bar{ display:flex; gap:10px; margin-bottom:18px; }
  .stat-pill{
    flex:1; background: var(--surface); border:1px solid var(--border);
    border-radius:14px; padding:10px 12px; display:flex; flex-direction:column; gap:3px;
  }
  .stat-label{ font-size:10px; text-transform:uppercase; letter-spacing:0.7px; color:var(--text-muted); }
  .stat-value{ font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:15px; }

  /* Besatz-Übersicht */
  .stock-card{ margin-bottom:18px; }
  .stock-total{ font-size:12px; color:var(--text-muted); margin-bottom:8px; }
  .stock-list{ display:flex; flex-wrap:wrap; gap:8px; }
  .stock-chip{
    background:var(--surface); border:1px solid var(--border); border-radius:999px;
    padding:6px 12px; font-size:13px; display:inline-flex; align-items:center; gap:4px; color:var(--text);
    cursor:pointer;
  }
  .stock-chip:active{ background:var(--surface-2); }
  .stock-chip b{ color:var(--accent); }

  /* Recommendations */
  .rec-list{ display:flex; flex-direction:column; gap:8px; margin-bottom:18px; }
  .rec-card{
    display:flex; align-items:flex-start; gap:8px;
    border-radius:12px; padding:10px 12px; font-size:13px;
    border:1px solid var(--border);
    text-decoration:none; transition:transform .12s ease, border-color .12s ease;
  }
  .rec-card.rec-good{ background:rgba(76,174,125,0.1); color:var(--good); border-color:rgba(76,174,125,0.3); font-weight:600; margin-bottom:18px; }
  .rec-card.rec-warn{ background:rgba(242,177,52,0.1); border-color:rgba(242,177,52,0.3); cursor:pointer; }
  .rec-card.rec-danger{ background:rgba(232,93,74,0.1); border-color:rgba(232,93,74,0.3); cursor:pointer; }
  .rec-card.rec-warn:hover, .rec-card.rec-danger:hover{ transform:translateX(2px); border-color:var(--accent); }
  .rec-text{ color:var(--text); line-height:1.4; flex:1; }
  .rec-arrow{ color:var(--accent); font-weight:600; flex-shrink:0; align-self:center; }

  /* KI-Einschätzung */
  .ai-card{
    background: var(--surface); border:1px solid var(--border); border-radius:14px;
    padding:14px; margin-bottom:18px; display:flex; flex-direction:column; gap:10px;
  }
  .ai-card-intro{ font-size:13px; color:var(--text-muted); line-height:1.4; }
  .ai-card-text{ font-size:13px; color:var(--text); line-height:1.5; white-space:pre-wrap; }
  .ai-card-error{ font-size:13px; color:var(--danger); line-height:1.4; }
  .ai-card-loading{ display:flex; align-items:center; gap:10px; font-size:13px; color:var(--text-muted); }
  .ai-spinner{
    width:16px; height:16px; border-radius:50%; flex-shrink:0;
    border:2px solid var(--border); border-top-color:var(--accent);
    animation: ai-spin 0.7s linear infinite;
  }
  @keyframes ai-spin{ to{ transform:rotate(360deg); } }
  .ai-card-footer{ display:flex; justify-content:flex-end; }

  /* Besatz-Assistent */
  .fish-row{
    background: var(--surface-2); border:1px solid var(--border); border-radius:12px;
    padding:10px 12px; margin-bottom:8px;
  }
  .fish-row-top{ display:flex; justify-content:space-between; align-items:baseline; gap:8px; }
  .fish-name{ font-weight:600; font-size:14px; }
  .fish-meta{ font-size:11px; color:var(--text-muted); }
  .fish-issue{ font-size:12px; margin-top:5px; line-height:1.4; }
  .fish-issue.warn{ color: var(--warn); }
  .fish-issue.danger{ color: var(--danger); }
  .fish-issue.good{ color: var(--good); }

  /* Trends */
  .param-chips{ display:flex; flex-wrap:wrap; gap:8px; padding-bottom:14px; }
  .param-chip{
    flex-shrink:0;
    padding:8px 14px;
    border-radius:999px;
    border:1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    font-size:13px;
    cursor:pointer;
    white-space:nowrap;
    display:flex; align-items:center; gap:6px;
  }
  .param-chip .dot{ width:7px; height:7px; border-radius:50%; }
  .param-chip.active{ background: var(--surface-2); color:var(--text); border-color: var(--accent); }
  .chart-card{
    background: var(--surface);
    border:1px solid var(--border);
    border-radius:16px;
    padding:16px 12px 12px;
  }
  .chart-card .stats-row{
    display:flex; justify-content:space-between; padding:0 6px 14px;
  }
  .chart-stat{ display:flex; flex-direction:column; gap:2px; }
  .chart-stat .label{ font-size:10px; text-transform:uppercase; letter-spacing:0.8px; color:var(--text-muted); }
  .chart-stat .value{ font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:16px; }
  .chart-wrap{ position:relative; height:220px; }
  .legend-row{ display:flex; gap:16px; justify-content:center; margin-top:10px; font-size:11px; color:var(--text-muted); }
  .legend-row .dot{ width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:5px; }

  .empty-state{

  @media print{

function getFishInfo(f){
  if(LANG !== 'de' && FISH_I18N[LANG] && FISH_I18N[LANG][f.name]){
    return FISH_I18N[LANG][f.name];
  }
  return { temperament: f.temperament, notes: f.notes };
}

function showToast(message){
  const app = document.getElementById('app');
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = message;
  app.appendChild(toast);
  requestAnimationFrame(() => toast.classList.add('show'));
  setTimeout(() => {
    toast.classList.remove('show');
    setTimeout(() => toast.remove(), 300);
  }, 2200);
}

function getLang(){
  try{ return localStorage.getItem('aqualog-lang'); }catch(_){ return null; }
}
function setLang(lang){
  try{ localStorage.setItem('aqualog-lang', lang); }catch(_){}
  LANG = lang;
}
let LANG = getLang() || 'de';
function t(s){
  const dict = I18N[LANG];
  return (dict && dict[s]) || s;
}

function getTheme(){
  try{ return localStorage.getItem('aqualog-theme') || 'dark'; }catch(_){ return 'dark'; }
}
function applyTheme(theme){
  document.documentElement.classList.toggle('theme-light', theme === 'light');
}
function chooseTheme(theme){
  try{ localStorage.setItem('aqualog-theme', theme); }catch(_){}
  applyTheme(theme);
  render();
}
applyTheme(getTheme());

const STORAGE_KEY = 'aqualog-data-v1';
const FIREBASE_URL = 'https://aqualog-store-default-rtdb.europe-west1.firebasedatabase.app';

function getUserPath(){
  const auth = getAuthState();
  if(!auth || !auth.localId) return null;
  return `aqualog/${auth.localId}`;
}

async function storageGet(){
  const token = await ensureFreshToken();
  const path = getUserPath();
  if(!token || !path) return localStorage.getItem(STORAGE_KEY);
  try{
    const res = await fetch(`${FIREBASE_URL}/${path}.json?auth=${token}`);
    if(!res.ok) throw new Error('Firebase-Antwort nicht ok');
    const data = await res.json();
    const json = data ? JSON.stringify(data) : null;
    if(json){ try{ localStorage.setItem(STORAGE_KEY, json); }catch(_){} }
    return json;
  }catch(e){
    console.error('Firebase nicht erreichbar, nutze lokalen Zwischenspeicher', e);
    return localStorage.getItem(STORAGE_KEY);
  }
}

async function storageSet(value){
  const token = await ensureFreshToken();
  const path = getUserPath();
  if(!token || !path){
    try{ localStorage.setItem(STORAGE_KEY, value); }catch(_){}
    return false;
  }
  try{
    const res = await fetch(`${FIREBASE_URL}/${path}.json?auth=${token}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: value
    });
    if(!res.ok) throw new Error('Firebase-Speichern fehlgeschlagen');
    try{ localStorage.setItem(STORAGE_KEY, value); }catch(_){}
    return true;
  }catch(e){
    console.error(e);
    try{ localStorage.setItem(STORAGE_KEY, value); }catch(_){}
    return false;
  }
}

async function loadState(){
  try{
    const raw = await storageGet();
    if(raw){
      state = JSON.parse(raw);
    } else {
      throw new Error('empty');
    }
  }catch(e){
    const firstTank = { id: uid(), name: 'Mein Aquarium' };
    state = { tanks:[firstTank], entries:[], events:[], activeTankId: firstTank.id };
    await saveState();
  }
  normalizeState();
  render();
  maybeShowTutorial();
}

function normalizeState(){
  // Firebase Realtime Database drops empty arrays/objects on save, so a field
  // that was an empty list comes back as undefined after a reload. Normalize.
  if(!Array.isArray(state.tanks)){
    state.tanks = state.tanks ? Object.values(state.tanks) : [];
  }
  if(!Array.isArray(state.entries)){
    state.entries = state.entries ? Object.values(state.entries) : [];
  }
  if(!Array.isArray(state.events)){
    state.events = state.events ? Object.values(state.events) : [];
  }
  if(state.tanks.length === 0){
    const firstTank = { id: uid(), name: 'Mein Aquarium' };
    state.tanks = [firstTank];
    state.activeTankId = firstTank.id;
  }
  if(!state.activeTankId && state.tanks.length){ state.activeTankId = state.tanks[0].id; }
}

async function saveState(){
  const ok = await storageSet(JSON.stringify(state));
  if(!ok){
    console.error('Cloud-Speichern fehlgeschlagen, lokal zwischengespeichert');
    alert('Konnte gerade nicht in die Cloud speichern (kein Internet?). Die Änderung ist vorerst nur lokal gesichert.');
  }
}

function getEffectiveParam(key){
  const base = PARAMS.find(p => p.key === key) || PARAMS[0];
  const tank = activeTank();
  const custom = tank && tank.customRanges && tank.customRanges[base.key];
  if(!custom) return base;
  return { ...base, good: custom.good, warn: custom.warn };
}

  pt: { ph:'pH', temp:'Temperatura', nh4:'Amônia', no2:'Nitrito', no3:'Nitrato', kh:'KH', gh:'GH', o2:'Oxigênio', po4:'Fosfato', fe:'Ferro', sio2:'Silicato', cu:'Cobre', co2:'CO₂' },

function getParamShortLabel(p){
  if(PARAM_SHORT_I18N[LANG] && PARAM_SHORT_I18N[LANG][p.key]) return PARAM_SHORT_I18N[LANG][p.key];
  return p.label.split(' ')[0];
}

function getStatus(param, value){
  if(value === null || value === undefined || value === '' || isNaN(value)) return null;
  const v = Number(value);
  const [gMin,gMax] = param.good;
  const [wMin,wMax] = param.warn;
  if(v >= gMin && v <= gMax) return 'good';
  if(v >= wMin && v <= wMax) return 'warn';
  return 'danger';
}

function buildGradient(param){
  const steps = 24;
  let stops = [];
  for(let i=0;i<=steps;i++){
    const v = param.min + (param.max-param.min)*(i/steps);
    const s = getStatus(param, v) || 'good';
    stops.push(`${STATUS_COLOR[s]} ${(i/steps*100).toFixed(1)}%`);
  }
  return `linear-gradient(90deg, ${stops.join(',')})`;
}

function pointerPos(param, value){
  const v = Number(value);
  let pct = (v - param.min) / (param.max - param.min);
  pct = Math.max(0, Math.min(1, pct));
  return (pct*100).toFixed(1) + '%';
}

function fmt(param, value){
  if(value === null || value === undefined || value === '') return null;
  return Number(value).toFixed(param.decimals);
}

function activeTank(){
  return state.tanks.find(t => t.id === state.activeTankId);
}
function tankEntries(){
  return (state.entries || [])
    .filter(e => e.tankId === state.activeTankId)
    .sort((a,b) => a.date < b.date ? 1 : -1);
}
function tankEvents(){
  return (state.events || [])
    .filter(e => e.tankId === state.activeTankId)
    .sort((a,b) => a.date < b.date ? 1 : -1);
}
function daysSince(dateStr){
  const then = new Date(dateStr + 'T00:00:00');
  const now = new Date();
  now.setHours(0,0,0,0);
  return Math.round((now - then) / 86400000);
}
function lastWaterChangeEvent(){
  return tankEvents().find(e => e.kind === 'maintenance' && (e.waterChangePercent != null || e.waterChangeLiters != null));
}
function daysLabel(days){
  if(days === null || days === undefined) return '–';
  if(days === 0) return t('Heute');
  if(days === 1) return t('Gestern');
  if(LANG === 'en') return `${days} days ago`;
  return `vor ${days} Tagen`;
}
function lastValueFor(key){
  const entries = tankEntries();
  for(const e of entries){
    if(e[key] !== null && e[key] !== undefined && e[key] !== '') return e;
  }
  return null;
}
function sparkValues(key, count){
  const entries = tankEntries().slice().reverse(); // chronological
  const vals = entries.filter(e => e[key] !== null && e[key] !== undefined && e[key] !== '').map(e => Number(e[key]));
  return vals.slice(-count);
}

function sparkSvg(param){
  const vals = sparkValues(param.key, 6);
  if(vals.length < 2) return '';
  const w=64,h=26,pad=3;
  const min = Math.min(...vals, param.good[0]);
  const max = Math.max(...vals, param.good[1]);
  const range = (max-min) || 1;
  const pts = vals.map((v,i) => {
    const x = pad + (w-2*pad) * (i/(vals.length-1));
    const y = h-pad - (h-2*pad) * ((v-min)/range);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  const lastStatus = getStatus(param, vals[vals.length-1]) || 'good';
  return `<svg class="spark" width="${w}" height="${h}"><polyline points="${pts}" fill="none" stroke="${STATUS_COLOR[lastStatus]}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

function getRecommendationDict(paramKey, direction){
  if(LANG !== 'de' && RECOMMENDATIONS_I18N[LANG] && RECOMMENDATIONS_I18N[LANG][paramKey]){
    const d = RECOMMENDATIONS_I18N[LANG][paramKey][direction];
    if(d) return d;
  }
  return RECOMMENDATIONS[paramKey] && RECOMMENDATIONS[paramKey][direction];
}

function getRecommendations(){
  const recs = [];
  PARAMS.forEach(base => {
    const p = getEffectiveParam(base.key);
    const entryWithVal = lastValueFor(p.key);
    if(!entryWithVal) return;
    const value = entryWithVal[p.key];
    const status = getStatus(p, value);
    if(status === 'warn' || status === 'danger'){
      const direction = Number(value) < p.good[0] ? 'low' : 'high';
      const dict = getRecommendationDict(p.key, direction);
      const message = (dict && dict[status]) || (LANG==='en' ? `${getParamLabel(p)} is outside the ideal range.` : `${p.label} liegt außerhalb des Idealbereichs.`);
      recs.push({ key:p.key, param:p, status, message, value });
    }
  });
  recs.sort((a,b) => (a.status === 'danger' ? 0 : 1) - (b.status === 'danger' ? 0 : 1));
  return recs;
}

    'invalid-argument': t('Kein Aquarium ausgewählt.'),
    'not-found': t('Für dieses Becken gibt es noch keine Wasserwerte-Einträge.'),
  };

}

async function requestAiAnalysis(){
  const tank = activeTank();
  if(!tank) return;
  ui.aiAnalysis[tank.id] = { ...(ui.aiAnalysis[tank.id]||{}), loading:true, error:null };
  render();
  try{
    const token = await ensureFreshToken();
    if(!token){
      ui.aiAnalysis[tank.id] = { loading:false, error: aiErrorMessage('unauthenticated'), text:null };
      render();
      return;
    }
    const res = await fetch(`${FUNCTIONS_URL}/analyzeWaterParameters`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body: JSON.stringify({ data: { tankId: tank.id } })
    });
    const json = await res.json();
    if(!res.ok || json.error){
      const code = json.error && json.error.status;
      ui.aiAnalysis[tank.id] = { loading:false, error: aiErrorMessage(code), text:null };
    } else {
      const analysis = json.result && json.result.analysis;
      ui.aiAnalysis[tank.id] = { loading:false, error:null, text: analysis || aiErrorMessage(null) };
    }
  }catch(e){
    console.error('KI-Einschätzung fehlgeschlagen', e);
    ui.aiAnalysis[tank.id] = { loading:false, error: t('Netzwerkfehler – bitte prüfe deine Internetverbindung und versuch es erneut.'), text:null };
  }
  render();
}

function getCurrentStock(){
  const events = tankEvents().filter(e => e.kind === 'stocking' && e.species);
  const groups = {};
  events.forEach(e => {
    const key = e.species.trim().toLowerCase();
    if(!groups[key]) groups[key] = { species: e.species.trim(), count: 0 };
    const amount = e.count != null ? e.count : 1;
    if(e.stockingType === 'einsatz') groups[key].count += amount;
    else if(e.stockingType === 'verlust') groups[key].count -= amount;
  });
  return Object.values(groups).filter(g => g.count > 0).sort((a,b) => b.count - a.count);
}

function getGroupPrice(speciesKey){
  const prices = tankEvents()
    .filter(e => e.kind === 'stocking' && e.stockingType === 'einsatz' && e.species && e.species.trim().toLowerCase() === speciesKey && e.pricePerUnit != null)
    .map(e => e.pricePerUnit);
  const unique = [...new Set(prices)];
  return unique.length === 1 ? unique[0] : null;
}

function getStockingTotalCost(){
  return tankEvents()
    .filter(e => e.kind === 'stocking' && e.stockingType === 'einsatz' && e.pricePerUnit != null)
    .reduce((sum, e) => sum + (e.pricePerUnit * (e.count != null ? e.count : 1)), 0);
}

function renderOverview(main){

function renderTrends(main){
  const entries = tankEntries();
  if(entries.length === 0){
    main.innerHTML = `<div class="empty-state"><div class="big">📈</div>${t('Noch keine Messwerte für Trends.')}<br>${t('Tippe unten auf')} <b>+</b>, ${t('um deinen ersten Eintrag zu machen.')}</div>`;
    return;
  }
  const param = getEffectiveParam(ui.selectedParam) || PARAMS[0];
  const chips = PARAMS.map(base => {
    const p = getEffectiveParam(base.key);
    const entryWithVal = lastValueFor(p.key);
    const status = entryWithVal ? getStatus(p, entryWithVal[p.key]) : null;
    const dotColor = STATUS_COLOR[status || 'none'];
    return `
    <button class="param-chip ${p.key===param.key?'active':''}" onclick="selectTrendParam('${p.key}')">
      <span class="dot" style="background:${dotColor}"></span>${getParamShortLabel(p)}
    </button>
  `;
  }).join('');

  const chron = entries.slice().reverse();
  const withVal = chron.filter(e => e[param.key] !== null && e[param.key] !== undefined && e[param.key] !== '');

  if(withVal.length === 0){
    main.innerHTML = `
      <div class="section-label">${t('Trend wählen')}</div>
      <div class="param-chips">${chips}</div>
      <div class="empty-state"><div class="big">💧</div>${LANG==='en' ? `No values yet for ${escapeHtml(getParamLabel(param))}.` : `Für ${escapeHtml(param.label)} liegen noch keine Werte vor.`}</div>
    `;
    return;
  }

  const values = withVal.map(e => Number(e[param.key]));
  const latestVal = values[values.length - 1];
  const avgVal = values.reduce((a,b)=>a+b,0) / values.length;
  const latestStatus = getStatus(param, latestVal) || 'good';

  main.innerHTML = `
    <div class="section-label">${t('Trend wählen')}</div>
    <div class="param-chips">${chips}</div>
    <div class="chart-card">
      <div class="stats-row">
        <div class="chart-stat">
          <div class="label">${t('Aktuell')}</div>
          <div class="value" style="color:${STATUS_COLOR[latestStatus]}">${fmt(param, latestVal)}${param.unit}</div>
        </div>
        <div class="chart-stat">
          <div class="label">${t('Durchschnitt')}</div>
          <div class="value">${fmt(param, avgVal)}${param.unit}</div>
        </div>
        <div class="chart-stat">
          <div class="label">${t('Messungen')}</div>
          <div class="value">${values.length}</div>
        </div>
      </div>
      <div class="chart-wrap"><canvas id="trend-canvas"></canvas></div>
      <div class="legend-row">
        <span><span class="dot" style="background:rgba(111,191,115,0.35)"></span>${t('Idealbereich')}</span>
        <span><span class="dot" style="background:${STATUS_COLOR.good}"></span>${t('Messwert')}</span>
      </div>
    </div>
  `;

  drawTrendChart(param, withVal);
}

function drawTrendChart(param, withVal){
  const canvas = document.getElementById('trend-canvas');
  if(!canvas || typeof Chart === 'undefined') return;
  if(trendChart){ trendChart.destroy(); trendChart = null; }

  const light = getTheme() === 'light';
  const lineColor = light ? '#1c7f8c' : '#3db8e8';
  const fillColor = light ? 'rgba(28,127,140,0.10)' : 'rgba(61,184,232,0.12)';
  const tickColor = light ? '#5b6c6e' : '#9fb3c8';
  const gridColor = light ? 'rgba(20,32,35,0.08)' : 'rgba(143,166,163,0.08)';

  const labels = withVal.map(e => formatDate(e.date));
  const values = withVal.map(e => Number(e[param.key]));
  const pointColors = values.map(v => STATUS_COLOR[getStatus(param, v) || 'good']);
  const goodMin = param.good[0];
  const goodMax = param.good[1];

  trendChart = new Chart(canvas.getContext('2d'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: 'Idealbereich unten',
          data: labels.map(()=>goodMin),
          borderColor: 'transparent',
          pointRadius: 0,
          fill: false,
          order: 3
        },
        {
          label: 'Idealbereich',
          data: labels.map(()=>goodMax),
          borderColor: 'transparent',
          backgroundColor: 'rgba(111,191,115,0.15)',
          pointRadius: 0,
          fill: '-1',
          order: 2
        },
        {
          label: getParamLabel(param),
          data: values,
          borderColor: lineColor,
          backgroundColor: fillColor,
          pointBackgroundColor: pointColors,
          pointBorderColor: pointColors,
          pointRadius: 4,
          pointHoverRadius: 6,
          tension: 0.3,
          fill: false,
          order: 1
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          filter: (item) => item.datasetIndex === 2,
          callbacks: {
            label: (item) => `${getParamLabel(param)}: ${item.formattedValue}${param.unit}`
          }
        }
      },
      scales: {
        x: {
          ticks: { color: tickColor, font: { size: 10 } },
          grid: { color: gridColor }
        },
        y: {
          ticks: { color: tickColor, font: { size: 10 } },
          grid: { color: gridColor }
        }
      }
    }
  });
}

async function saveTargets(){
  const tank = activeTank();
  if(!tank) return;
  tank.customRanges = tank.customRanges || {};
  CUSTOMIZABLE_PARAMS.forEach(key => {
    const base = PARAMS.find(p => p.key === key);
    const min = Number(document.getElementById(`tg-${key}-min`).value);
    const max = Number(document.getElementById(`tg-${key}-max`).value);
    const marginLow = base.good[0] - base.warn[0];
    const marginHigh = base.warn[1] - base.good[1];
    tank.customRanges[key] = { good:[min,max], warn:[min-marginLow, max+marginHigh] };
  });
  await saveState();
  closeModal();
}

async function resetTargets(){
  const tank = activeTank();
  if(tank){ delete tank.customRanges; await saveState(); }
  closeModal();
}

async function saveStockEdit(){
  const oldKey = ui.editingStockKey;
  const newName = document.getElementById('es-species').value.trim();
  const newCount = Number(document.getElementById('es-count').value);
  const priceRaw = document.getElementById('es-price').value;
  if(!newName){ alert('Bitte einen Namen eingeben.'); return; }
  if(isNaN(newCount) || newCount < 0){ alert('Bitte eine gültige Anzahl (0 oder mehr) eingeben.'); return; }

  const newKey = newName.toLowerCase();
  if(newKey !== oldKey){
    state.events.forEach(e => {
      if(e.kind === 'stocking' && e.tankId === state.activeTankId && e.species && e.species.trim().toLowerCase() === oldKey){
        e.species = newName;
      }
    });
  }

  if(priceRaw !== ''){
    const newPrice = Number(priceRaw);
    state.events.forEach(e => {
      if(e.kind === 'stocking' && e.stockingType === 'einsatz' && e.tankId === state.activeTankId && e.species && e.species.trim().toLowerCase() === newKey){
        e.pricePerUnit = newPrice;
      }
    });
  }

  const recomputed = getCurrentStock().find(g => g.species.trim().toLowerCase() === newKey);
  const currentTotal = recomputed ? recomputed.count : 0;
  const delta = newCount - currentTotal;
  if(delta !== 0){
    state.events.push({
      id: uid(),
      tankId: state.activeTankId,
      kind: 'stocking',
      date: new Date().toISOString().slice(0,10),
      stockingType: delta > 0 ? 'einsatz' : 'verlust',
      species: newName,
      count: Math.abs(delta),
      pricePerUnit: delta > 0 && priceRaw !== '' ? Number(priceRaw) : null,
      note: 'Manuelle Korrektur (Gruppe bearbeitet)'
    });
  }

  await saveState();
  closeModal();
}

async function removeStockGroup(){
  const oldKey = ui.editingStockKey;
  const group = getCurrentStock().find(g => g.species.trim().toLowerCase() === oldKey);
  if(!group){ closeModal(); return; }
  if(!confirm(`"${group.species}" komplett aus dem Besatz entfernen (Anzahl auf 0 setzen)?`)) return;
  state.events.push({

    tankId: state.activeTankId,

    date: new Date().toISOString().slice(0,10),
    stockingType: 'verlust',
    species: group.species,
    count: group.count,
    note: 'Gruppe entfernt'
  });
  await saveState();
  closeModal();
}

function matchFish(speciesText){
  if(!speciesText) return null;
  const t = speciesText.toLowerCase().trim();
  return FISH_DB.find(f => {
    const name = f.name.toLowerCase();
    if(t.includes(name) || name.includes(t)) return true;
    return (f.aliases||[]).some(a => {
      const al = a.toLowerCase();
      return t.includes(al) || al.includes(t);
    });
  });
}

function getStockedGroups(){
  const events = tankEvents().filter(e => e.kind === 'stocking' && e.stockingType === 'einsatz' && e.species);
  const groups = {};
  events.forEach(e => {
    const key = e.species.trim().toLowerCase();
    if(!groups[key]) groups[key] = { species: e.species.trim(), count: 0 };
    groups[key].count += (e.count != null ? e.count : 1);
  });
  return Object.values(groups);
}

function assessFish(f, tank, currentPh, currentTemp){
  const issues = [];
  if(tank && tank.volumeLiters && f.minLiters && tank.volumeLiters < f.minLiters){
    issues.push(`Becken zu klein (mind. ${f.minLiters} L nötig)`);
  }
  if(f.minLengthCm && tank && tank.lengthCm && tank.lengthCm < f.minLengthCm){
    issues.push(`Kantenlänge zu kurz (mind. ${f.minLengthCm} cm nötig)`);
  }
  if(currentPh !== null && currentPh !== undefined && (currentPh < f.ph[0] || currentPh > f.ph[1])){
    issues.push(`pH weicht ab (ideal ${f.ph[0]}–${f.ph[1]})`);
  }
  if(currentTemp !== null && currentTemp !== undefined && (currentTemp < f.temp[0] || currentTemp > f.temp[1])){
    issues.push(`Temperatur weicht ab (ideal ${f.temp[0]}–${f.temp[1]}°C)`);
  }
  const sizeIssue = issues.some(i => i.includes('Becken') || i.includes('Kantenlänge'));
  const status = issues.length === 0 ? 'good' : (sizeIssue ? 'danger' : 'warn');
  return { issues, status };
}

async function firebaseSignIn(email, password){
  try{

      headers: { 'Content-Type': 'application/json' },

    if(!res.ok){
      const code = data.error && data.error.message;
      const friendly = {

    }
    setAuthState({
      idToken: data.idToken,
      refreshToken: data.refreshToken,
      expiresAt: Date.now() + Number(data.expiresIn) * 1000,
      email: data.email,
      localId: data.localId
    });

async function firebaseRefreshToken(refreshToken){
  try{
    const res = await fetch(`https://securetoken.googleapis.com/v1/token?key=${FIREBASE_API_KEY}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: `grant_type=refresh_token&refresh_token=${encodeURIComponent(refreshToken)}`
    });
    const data = await res.json();
    if(!res.ok) return null;
    return {
      idToken: data.id_token,
      refreshToken: data.refresh_token,
      expiresAt: Date.now() + Number(data.expires_in) * 1000,
      localId: data.user_id
    };
  }catch(e){ return null; }
}

async function ensureFreshToken(){
  const auth = getAuthState();
  if(!auth) return null;
  if(Date.now() < auth.expiresAt - 60000){
    return auth.idToken;
  }
  const refreshed = await firebaseRefreshToken(auth.refreshToken);
  if(!refreshed){
    clearAuthState();
    return null;
  }
  setAuthState({ ...auth, ...refreshed });
  return refreshed.idToken;
}

  } else {

}

      <div class="lock-title">${t('Bei AquaMeter anmelden')}</div>
      <div class="lock-sub">Melde dich mit deinem AquaMeter-App-Konto an, um deine Wasserwerte auch hier im Browser einzusehen und zu bearbeiten.</div>
      <div class="field" style="width:100%; max-width:280px;">
        <label>${t('E-Mail')}</label>
        <input type="email" id="auth-email" autocomplete="username">
      </div>
      <div class="field" style="width:100%; max-width:280px;">
        <label>${t('Passwort')}</label>
        <div class="password-wrap">
          <input type="password" id="auth-password" autocomplete="current-password" onkeydown="if(event.key==='Enter') submitLogin()">
          <button type="button" class="password-toggle" onclick="togglePasswordField('auth-password', this)">👁️</button>
        </div>
      </div>
      <div class="lock-error" id="lock-error">${errorMsg || ''}</div>
      <div class="lock-actions">
        <button class="btn btn-primary" onclick="submitLogin()">${t('Anmelden')}</button>
      </div>
      <div style="margin-top:24px; font-size:13px; color:var(--text-muted); text-align:center; max-width:300px;">
        Noch kein Konto? Ein Konto lässt sich ausschließlich über die <strong style="color:var(--text);">AquaMeter-App</strong> anlegen – lade sie dir dafür aus dem <a href="https://apps.apple.com/de/app/aquameter-aquarium-tracker/id6789518225" style="color:var(--accent);">App Store</a>.
      </div>
    </div>
  `;
  document.getElementById('auth-email').focus();
}

function toggleAuthMode(){
  authMode = authMode === 'signup' ? 'signin' : 'signup';
  renderLogin();
}

function togglePasswordField(id, btn){
  const input = document.getElementById(id);
  if(!input) return;
  if(input.type === 'password'){
    input.type = 'text';
    btn.textContent = '🙈';
  } else {
    input.type = 'password';
    btn.textContent = '👁️';
  }
}

async function submitLogin(){
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const errorEl = document.getElementById('lock-error');
  if(!email || !password){
    errorEl.textContent = t('Bitte E-Mail und Passwort eingeben.');
    return;
  }
  if(authMode === 'signup'){
    const confirmPw = document.getElementById('auth-password-confirm').value;
    if(password !== confirmPw){
      errorEl.textContent = t('Passwörter stimmen nicht überein.');
      return;
    }
    if(password.length < 6){
      errorEl.textContent = t('Passwort muss mindestens 6 Zeichen haben.');
      return;
    }
    errorEl.textContent = t('Konto wird erstellt …');
    const result = await firebaseSignUp(email, password);
    if(result.error){
      errorEl.textContent = result.error;
    } else {
      loadState();
    }
  } else {
    errorEl.textContent = t('Anmeldung läuft …');
    const result = await firebaseSignIn(email, password);
    if(result.error){
      errorEl.textContent = result.error;
    } else {
      loadState();
    }
  }
}

function logout(){
  clearAuthState();
  ui.modal = null;
  initAuth();
}

async function deleteAccount(){
  const confirmMsg = LANG === 'de'
    ? 'Konto wirklich unwiderruflich löschen? Alle deine Aquarien, Wasserwerte und Einstellungen werden dabei gelöscht. Das kann nicht rückgängig gemacht werden.'
    : t('Konto wirklich unwiderruflich löschen? Alle deine Aquarien, Wasserwerte und Einstellungen werden dabei gelöscht. Das kann nicht rückgängig gemacht werden.');
  if(!confirm(confirmMsg)) return;
  if(!confirm(LANG === 'de' ? 'Bist du dir wirklich sicher?' : t('Bist du dir wirklich sicher?'))) return;

  const token = await ensureFreshToken();
  const path = getUserPath();

  try{
    if(token && path){
      await fetch(`${FIREBASE_URL}/${path}.json?auth=${token}`, { method: 'DELETE' });
    }
  }catch(e){ console.error('Datenlöschung fehlgeschlagen', e); }

  try{
    if(token){
      await fetch(`https://identitytoolkit.googleapis.com/v1/accounts:delete?key=${FIREBASE_API_KEY}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ idToken: token })
      });
    }
  }catch(e){ console.error('Konto-Löschung fehlgeschlagen', e); }

  try{ localStorage.removeItem(STORAGE_KEY); }catch(_){}
  clearAuthState();
  ui.modal = null;
  initAuth();
}

let reportCharts = [];

function ensureReportContainer(){
  let el = document.getElementById('print-report');
  if(!el){
    el = document.createElement('div');
    el.id = 'print-report';
    el.className = 'print-report';
    document.body.appendChild(el);
  }
  return el;
}

function buildReportTable(rows, paramsWithData){
  if(rows.length === 0) return `<div class="empty-hint">${t('Keine Messungen vorhanden.')}</div>`;
  return `
    <table class="pr-table">
      <thead><tr><th>${t("Datum")}</th>${paramsWithData.map(p => `<th>${escapeHtml(getParamShortLabel(p))}</th>`).join('')}</tr></thead>
      <tbody>
        ${rows.map(e => `
          <tr>
            <td>${formatDate(e.date)}</td>
            ${paramsWithData.map(p => `<td>${(e[p.key] !== null && e[p.key] !== undefined && e[p.key] !== '') ? fmt(p, e[p.key]) : '–'}</td>`).join('')}
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

function buildPrintReport(){
  reportCharts.forEach(c => c.destroy());
  reportCharts = [];

  const tank = activeTank();
  const entries = tankEntries();
  const chron = entries.slice().reverse();
  const recs = getRecommendations();
  const lastTest = entries[0];
  const lastWC = lastWaterChangeEvent();

  const paramsWithData = PARAMS
    .map(base => getEffectiveParam(base.key))
    .filter(p => chron.some(e => e[p.key] !== null && e[p.key] !== undefined && e[p.key] !== ''));

  const stock = getCurrentStock();
  const stockTotal = stock.reduce((sum,s) => sum + s.count, 0);
  const stockCost = getStockingTotalCost();

  const el = ensureReportContainer();
  el.innerHTML = `
    <div class="pr-title">AquaMeter – ${t('Wasserbericht')}</div>
    <div class="pr-sub">${escapeHtml(tank ? tank.name : '')} · ${t('erstellt am')} ${new Date().toLocaleDateString(dateLocale())}</div>
    <div class="pr-summary">
      <div class="pr-stat"><span>${t('Messungen gesamt')}</span><b>${entries.length}</b></div>
      <div class="pr-stat"><span>${t('Letzter Test')}</span><b>${lastTest ? formatDate(lastTest.date) : '–'}</b></div>
      <div class="pr-stat"><span>${t('Letzter Wasserwechsel')}</span><b>${lastWC ? formatDate(lastWC.date) : '–'}</b></div>
    </div>
    <div class="pr-section-title">${t('Aktueller Besatz')}</div>
    ${stock.length === 0
      ? `<div class="empty-hint">${t('Kein Besatz eingetragen.')}</div>`
      : `<div class="pr-sub" style="margin:-6px 0 8px;">${stockTotal} ${LANG==='de' ? ('Tier'+(stockTotal===1?'':'e')) : t('Tier')} · ${stock.length} ${LANG==='de' ? ('Art'+(stock.length===1?'':'en')) : t('Arten')}${stockCost > 0 ? ` · ${formatEuro(stockCost)} ${t('investiert')}` : ''}</div>
         <div class="pr-stock-list">${stock.map(s => `<span class="pr-stock-chip">${escapeHtml(s.species)} × ${s.count}</span>`).join('')}</div>`}
    <div class="pr-section-title">${t('Bewertung')}</div>
    ${recs.length === 0
      ? `<div class="pr-rec good">✓ ${t('Alle gemessenen Werte waren zuletzt im Idealbereich.')}</div>`
      : recs.map(r => `<div class="pr-rec ${r.status}">${escapeHtml(getParamLabel(r.param))} (${fmt(r.param, r.value)}${r.param.unit}): ${escapeHtml(r.message)}</div>`).join('')}
    <div class="pr-section-title">${t('Verlauf der Werte')}</div>
    <div class="pr-chart-grid">
      ${paramsWithData.map(p => `
        <div class="pr-chart-card">
          <div class="pr-chart-title">${escapeHtml(getParamLabel(p))}</div>
          <canvas id="pr-chart-${p.key}" width="340" height="130"></canvas>
        </div>
      `).join('')}
    </div>
    <div class="pr-section-title">${t('Letzte Messungen')}</div>
    ${buildReportTable(entries.slice(0, 10), paramsWithData)}
    <div class="pr-footer">${t('Erstellt mit')} AquaMeter · ${new Date().toLocaleString(dateLocale())}</div>
  `;

  paramsWithData.forEach(p => {
    const canvas = document.getElementById(`pr-chart-${p.key}`);
    if(!canvas || typeof Chart === 'undefined') return;
    const withVal = chron.filter(e => e[p.key] !== null && e[p.key] !== undefined && e[p.key] !== '');
    const labels = withVal.map(e => formatDate(e.date));
    const values = withVal.map(e => Number(e[p.key]));
    const chart = new Chart(canvas.getContext('2d'), {
      type: 'line',
      data: {
        labels,
        datasets: [
          { data: labels.map(()=>p.good[0]), borderColor:'transparent', pointRadius:0, fill:false },
          { data: labels.map(()=>p.good[1]), borderColor:'transparent', backgroundColor:'rgba(61,184,232,0.18)', pointRadius:0, fill:'-1' },
          { data: values, borderColor:'#1c7f8c', backgroundColor:'rgba(28,127,140,0.08)', pointRadius:2, pointBackgroundColor:'#1c7f8c', tension:0.3, fill:false }
        ]
      },
      options: {
        responsive: false,
        animation: false,
        plugins: { legend: { display:false } },
        scales: {
          x: { ticks:{ color:'#888', font:{ size:9 } }, grid:{ color:'#eee' } },
          y: { ticks:{ color:'#888', font:{ size:9 } }, grid:{ color:'#eee' } }
        }
      }
    });
    reportCharts.push(chart);
  });
}

async function generateReport(){
  const entries = tankEntries();
  const stock = getCurrentStock();
  if(entries.length === 0 && stock.length === 0){
    alert(t('Für dieses Aquarium liegen noch keine Messwerte oder Besatzdaten vor.'));
    return;
  }

  const btn = document.querySelector('[onclick="generateReport()"]');
  const originalLabel = btn ? btn.textContent : null;
  if(btn){ btn.disabled = true; btn.textContent = '…'; }

  try {
    buildPrintReport();
    // Kurze Pause, damit Chart.js die Diagramme fertig zeichnen kann
    await new Promise(resolve => setTimeout(resolve, 400));

    const el = document.getElementById('print-report');
    if(!el || typeof html2canvas === 'undefined' || !window.jspdf){
      throw new Error('PDF-Bibliotheken nicht geladen.');
    }

    const canvas = await html2canvas(el, {
      scale: 2,
      backgroundColor: '#ffffff',
      useCORS: true,
      windowWidth: el.scrollWidth,
      windowHeight: el.scrollHeight
    });

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('p', 'pt', 'a4');
    const pageWidth = pdf.internal.pageSize.getWidth();
    const pageHeight = pdf.internal.pageSize.getHeight();

    const imgWidth = pageWidth;
    const imgHeight = (canvas.height * imgWidth) / canvas.width;
    const imgData = canvas.toDataURL('image/jpeg', 0.92);

    let heightLeft = imgHeight;
    let position = 0;

    pdf.addImage(imgData, 'JPEG', 0, position, imgWidth, imgHeight);
    heightLeft -= pageHeight;

    while (heightLeft > 0) {
      position -= pageHeight;
      pdf.addPage();
      pdf.addImage(imgData, 'JPEG', 0, position, imgWidth, imgHeight);
      heightLeft -= pageHeight;
    }

    const tank = activeTank();
    const filename = `AquaMeter-Bericht-${tank ? tank.name.replace(/[^a-z0-9]+/gi,'-') : 'Bericht'}.pdf`;

    // Als Blob öffnen -> öffnet die native PDF-Ansicht des iPhones,
    // von der aus geteilt/gespeichert/gedruckt werden kann (funktioniert auch in der App, nicht nur im Browser)
    const pdfBlob = pdf.output('blob');
    const blobUrl = URL.createObjectURL(pdfBlob);
    window.open(blobUrl, '_blank');

    // Aufräumen nach kurzer Verzögerung (Blob muss noch geladen werden können)
    setTimeout(() => URL.revokeObjectURL(blobUrl), 30000);

  } catch(err){
    console.error('PDF-Erstellung fehlgeschlagen:', err);
    alert(t('Der PDF-Bericht konnte nicht erstellt werden. Bitte versuche es erneut.'));
  } finally {
    if(btn){ btn.disabled = false; btn.textContent = originalLabel; }
  }
}

async function refreshData(){
  closeModal();
  await loadState();
}

async function silentRefresh(){
  if(ui.modal) return; // nicht mitten in einer offenen Eingabe stören
  try{
    const raw = await storageGet();
    if(raw){
      state = JSON.parse(raw);
      normalizeState();
      render();
    }
  }catch(e){ /* still offline or unreachable, ignore */ }
}

document.addEventListener('visibilitychange', () => {
  if(document.visibilityState === 'visible'){
    silentRefresh();
  }
});
